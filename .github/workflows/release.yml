name: Release
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: lget-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: lget-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: lget-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: lget-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: lget-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Rename Artifact
        run: mv target/${{ matrix.target }}/release/lget${{ runner.os == 'Windows' && '.exe' || '' }} target/${{ matrix.target }}/release/${{ matrix.name }}

      - name: Upload Binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.name }}
          asset_name: ${{ matrix.name }}
          tag: ${{ github.ref }}
